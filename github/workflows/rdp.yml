name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Enable RDP and Create User
        run: |
          # RDP'yi aktif et
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

          # Kullanıcı oluştur
          $Password = ConvertTo-SecureString "RdpPass123!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          
          Write-Host "========================================"
          Write-Host "KULLANICI: RDP"
          Write-Host "ŞİFRE: RdpPass123!"
          Write-Host "========================================"
